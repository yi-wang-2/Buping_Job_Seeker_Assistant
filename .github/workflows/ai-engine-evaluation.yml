name: AI Engine Evaluation

on:
  push:
    paths:
      - "src/libs/ai_engine/**"
      - "src/libs/interview_prep/**"
      - "src/libs/resume_and_cover_builder/**"
      - "backend/services/resume_service.py"
      - "backend/services/interview_service.py"
      - "backend/services/ai_skill_service.py"
      - "backend/services/ai_metrics_service.py"
      - "backend/api/endpoints/**"
      - "scripts/benchmark_ai_engine.py"
      - "tests/ai_engine/**"
      - "tests/test_interview_*.py"
      - "tests/fixtures/ai_engine/**"
      - ".github/workflows/ai-engine-evaluation.yml"
  pull_request:
    paths:
      - "src/libs/ai_engine/**"
      - "src/libs/interview_prep/**"
      - "src/libs/resume_and_cover_builder/**"
      - "backend/services/resume_service.py"
      - "backend/services/interview_service.py"
      - "backend/services/ai_skill_service.py"
      - "backend/services/ai_metrics_service.py"
      - "backend/api/endpoints/**"
      - "scripts/benchmark_ai_engine.py"
      - "tests/ai_engine/**"
      - "tests/test_interview_*.py"
      - "tests/fixtures/ai_engine/**"
      - ".github/workflows/ai-engine-evaluation.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: >-
          python -m pip install pytest pytest-mock fastapi httpx pydantic
          PyYAML loguru reportlab langchain-core
      - name: Run AI Engine workflow tests
        run: >-
          python -m pytest tests/ai_engine tests/test_interview_ai_metrics.py
          tests/test_interview_prep_report.py -q
      - name: Run deterministic AI Engine evaluation
        run: python scripts/benchmark_ai_engine.py --check --output artifacts/ai-engine-benchmark.json
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-benchmark
          path: artifacts/ai-engine-benchmark.json
          if-no-files-found: warn
